{{- if include "twentycrm-chart.generatesSecret" . }}
{{- $genMain := not .Values.secret.secretRef -}}
{{- $genDbPw := and (eq (include "twentycrm-chart.bundledDb" .) "true") (not .Values.secret.db.secretRef) -}}
{{- $rk := .Values.secret.secretRefKey | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "twentycrm-chart.generatedSecretName" . }}
  namespace: {{ include "twentycrm-chart.namespace" . }}
  labels:
    {{- include "twentycrm-chart.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if $genMain }}
  # Keys follow secret.secretRefKey (lowercase convention).
  # APP_SECRET / ENCRYPTION_KEY are auto-generated when left blank.
  {{ $rk.appSecret | default "app_secret" }}: {{ include "twentycrm-chart.appSecret" . | quote }}
  {{ $rk.encryptionKey | default "encryption_key" }}: {{ include "twentycrm-chart.encryptionKey" . | quote }}
  {{ $rk.fallbackEncryptionKey | default "fallback_encryption_key" }}: {{ .Values.secret.fallbackEncryptionKey | quote }}
  {{- end }}
  {{- if $genDbPw }}
  # PostgreSQL password (POSTGRES_PASSWORD on the bundled db; feeds PG_DATABASE_URL).
  {{ .Values.secret.db.secretRefKey.password | default "database_password" }}: {{ include "twentycrm-chart.dbPassword" . | quote }}
  {{- end }}
{{- end }}
