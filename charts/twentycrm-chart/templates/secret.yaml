{{- if include "twentycrm-chart.generatesSecret" . }}
{{- $genMain := not .Values.secret.secretRef -}}
{{- $genDbPw := and .Values.postgresql.enabled (not .Values.postgresql.auth.secretRef) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "twentycrm-chart.generatedSecretName" . }}
  namespace: {{ include "twentycrm-chart.namespace" . }}
  labels:
    {{- include "twentycrm-chart.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if $genMain }}
  # --- server/worker sensitive env (omitted when secret.secretRef is set) ---
  # APP_SECRET / ENCRYPTION_KEY are auto-generated when left empty.
  APP_SECRET: {{ include "twentycrm-chart.appSecret" . | quote }}
  ENCRYPTION_KEY: {{ include "twentycrm-chart.encryptionKey" . | quote }}
  FALLBACK_ENCRYPTION_KEY: {{ .Values.secret.fallbackEncryptionKey | quote }}
  # Full connection string consumed by the server & worker.
  PG_DATABASE_URL: {{ include "twentycrm-chart.databaseUrl" . | quote }}
  {{- end }}
  {{- if $genDbPw }}
  # PG_DATABASE_PASSWORD feeds POSTGRES_PASSWORD on the bundled db
  # (omitted when postgresql.auth.secretRef is set).
  PG_DATABASE_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- with .Values.secret.extraEnv }}
  {{- range $key, $val := . }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
