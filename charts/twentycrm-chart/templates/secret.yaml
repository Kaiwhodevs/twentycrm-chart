{{- if include "twentycrm-chart.generatesSecret" . }}
{{- $genMain := not .Values.secret.secretRef -}}
{{- $genDbPw := and .Values.postgresql.enabled (not .Values.postgresql.auth.secretRef) -}}
{{- $rk := .Values.secret.secretRefKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "twentycrm-chart.generatedSecretName" . }}
  namespace: {{ include "twentycrm-chart.namespace" . }}
  labels:
    {{- include "twentycrm-chart.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if $genMain }}
  # Keys follow the secret.secretRefKey mapping (lowercase convention).
  # APP_SECRET / ENCRYPTION_KEY are auto-generated when left empty.
  {{- with (index $rk "APP_SECRET") }}
  {{ . }}: {{ include "twentycrm-chart.appSecret" $ | quote }}
  {{- end }}
  {{- with (index $rk "ENCRYPTION_KEY") }}
  {{ . }}: {{ include "twentycrm-chart.encryptionKey" $ | quote }}
  {{- end }}
  {{- with (index $rk "FALLBACK_ENCRYPTION_KEY") }}
  {{ . }}: {{ $.Values.secret.fallbackEncryptionKey | quote }}
  {{- end }}
  {{- with (index $rk "PG_DATABASE_URL") }}
  {{ . }}: {{ include "twentycrm-chart.databaseUrl" $ | quote }}
  {{- end }}
  {{- end }}
  {{- if $genDbPw }}
  {{- with (index .Values.postgresql.auth.secretRefKey "POSTGRES_PASSWORD") }}
  # Feeds POSTGRES_PASSWORD on the bundled db.
  {{ . }}: {{ $.Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- end }}
  {{- range $key, $val := .Values.secret.extraEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
