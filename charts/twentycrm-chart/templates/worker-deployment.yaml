apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twentycrm-chart.workerName" . }}
  namespace: {{ include "twentycrm-chart.namespace" . }}
  labels:
    {{- include "twentycrm-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  {{- with .Values.worker.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "twentycrm-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "twentycrm-chart.generatesSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "twentycrm-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "twentycrm-chart.serviceAccountName" . }}
      {{- include "twentycrm-chart.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Mirrors the compose: worker depends_on db (healthy) and server (healthy).
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-db
          image: {{ include "twentycrm-chart.imageRef" (dict "image" .Values.postgresql.image "tag" .Values.postgresql.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ include "twentycrm-chart.dbName" . }} -p {{ .Values.postgresql.port }}; do echo "waiting for db"; sleep 2; done
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: {{ include "twentycrm-chart.imageRef" (dict "image" .Values.redis.image "tag" (.Values.redis.image.tag | default "latest") "global" .Values.global) }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - sh
            - -c
            - until redis-cli -h {{ include "twentycrm-chart.redisName" . }} -p {{ .Values.redis.service.port }} ping >/dev/null 2>&1; do echo "waiting for redis"; sleep 2; done
        {{- end }}
        - name: wait-for-server
          image: {{ include "twentycrm-chart.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - until curl -fsS http://{{ include "twentycrm-chart.serverName" . }}:{{ .Values.server.service.port }}{{ .Values.server.livenessProbe.httpGet.path }} >/dev/null 2>&1; do echo "waiting for server"; sleep 2; done
      containers:
        - name: worker
          image: {{ include "twentycrm-chart.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["yarn", "worker:prod"]
          envFrom:
            - configMapRef:
                name: {{ include "twentycrm-chart.configMapName" . }}
          env:
            {{- include "twentycrm-chart.serverSecretEnv" . | nindent 12 }}
            # Overrides: these jobs run on the server only (mirrors the compose).
            - name: DISABLE_DB_MIGRATIONS
              value: "true"
            - name: DISABLE_CRON_JOBS_REGISTRATION
              value: "true"
          volumeMounts:
            - name: server-local-data
              mountPath: /app/packages/twenty-server/.local-storage
            {{- with .Values.worker.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: server-local-data
          {{- if .Values.localStorage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "twentycrm-chart.fullname" . }}-local-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.worker.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.worker.affinity }}
      affinity:
        {{- toYaml .Values.worker.affinity | nindent 8 }}
      {{- else if .Values.localStorage.persistence.enabled }}
      # Co-locate the worker on the same node as the server so both can mount the
      # shared ReadWriteOnce local-storage volume. This makes the default work on
      # any cluster (single- or multi-node) without requiring ReadWriteMany.
      # Override worker.affinity, or use S3 storage / disable localStorage, to
      # let the worker schedule freely.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "twentycrm-chart.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: server
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
