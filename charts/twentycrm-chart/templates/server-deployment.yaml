apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twentycrm-chart.serverName" . }}
  namespace: {{ include "twentycrm-chart.namespace" . }}
  labels:
    {{- include "twentycrm-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.server.autoscaling.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  {{- with .Values.server.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "twentycrm-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "twentycrm-chart.generatesSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "twentycrm-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "twentycrm-chart.serviceAccountName" . }}
      {{- include "twentycrm-chart.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (eq (include "twentycrm-chart.bundledDb" .) "true") .Values.redis.enabled }}
      initContainers:
        {{- if eq (include "twentycrm-chart.bundledDb" .) "true" }}
        - name: wait-for-db
          image: {{ include "twentycrm-chart.imageRef" (dict "image" .Values.postgresql.image "tag" .Values.postgresql.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ include "twentycrm-chart.dbName" . }} -p {{ .Values.postgresql.port }}; do echo "waiting for db"; sleep 2; done
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: {{ include "twentycrm-chart.imageRef" (dict "image" .Values.redis.image "tag" (.Values.redis.image.tag | default "latest") "global" .Values.global) }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - sh
            - -c
            - until redis-cli -h {{ include "twentycrm-chart.redisName" . }} -p {{ .Values.redis.service.port }} ping >/dev/null 2>&1; do echo "waiting for redis"; sleep 2; done
        {{- end }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "twentycrm-chart.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.nodePort }}
          envFrom:
            - configMapRef:
                name: {{ include "twentycrm-chart.configMapName" . }}
          env:
            # App secrets via secretKeyRef + PG_DATABASE_URL (from secret.secretRef,
            # or assembled at runtime). See helper twentycrm-chart.serverSecretEnv.
            {{- include "twentycrm-chart.serverSecretEnv" . | nindent 12 }}
          {{- if .Values.server.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.server.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.server.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.server.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.server.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.server.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: server-local-data
              mountPath: /app/packages/twenty-server/.local-storage
            {{- with .Values.server.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: server-local-data
          {{- if .Values.localStorage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "twentycrm-chart.fullname" . }}-local-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.server.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
