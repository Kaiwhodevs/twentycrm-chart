# Production example: secret-free values, S3 storage, ingress with TLS, HA server.
#
#   kubectl create secret generic twenty-secret \
#     --from-literal=app_secret="$(openssl rand -base64 32)" \
#     --from-literal=encryption_key="$(openssl rand -base64 32)" \
#     --from-literal=fallback_encryption_key="" \
#     --from-literal=database_url="postgres://postgres:CHANGE_ME@twenty-twentycrm-chart-db:5432/default"
#   kubectl create secret generic twenty-db \
#     --from-literal=database_password="CHANGE_ME"   # must match the URL above
#
#   helm install twenty oci://ghcr.io/kaiwhodevs/twentycrm-chart \
#     --version v2.8.3 -f production.yaml
config:
  serverUrl: https://crm.example.com
  storage:
    type: s3
    s3Region: us-east-1
    s3Name: my-twenty-bucket
    s3Endpoint: ""   # empty for AWS S3; set for MinIO / R2 / etc.

# No secrets in values - sourced from pre-created Secrets via secretKeyRef.
# secretRefKey: <field>: <key-in-secret> (lowercase Secret keys).
secret:
  secretRef: twenty-secret
  secretRefKey:
    appSecret: app_secret
    encryptionKey: encryption_key
    fallbackEncryptionKey: fallback_encryption_key
    databaseUrl: database_url
  db:
    secretRef: twenty-db
    secretRefKey:
      password: database_password

postgresql:
  persistence:
    size: 20Gi
    storageClass: gp3

server:
  replicaCount: 2
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 2Gi }
  # With S3 storage the server no longer needs the shared RWO volume,
  # so rolling updates are safe:
  strategy:
    type: RollingUpdate
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  pdb:
    enabled: true
    minAvailable: 1

worker:
  replicaCount: 1
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }

redis:
  persistence:
    enabled: true
    size: 5Gi

# With S3 storage the shared local volume is not needed.
localStorage:
  persistence:
    enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: crm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: twenty-tls
      hosts:
        - crm.example.com
