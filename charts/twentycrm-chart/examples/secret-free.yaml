# Secret-free values: no passwords, tokens, or secrets in values or the Helm
# release history. Every sensitive value comes from pre-created Kubernetes Secrets
# via secretKeyRef (Supabase-style secret blocks).
#
# secretRefKey maps each FIELD name to the key inside the Secret (lowercase keys).
#
# 1. Create the Secrets:
#
#    kubectl create secret generic twenty-db \
#      --from-literal=database_password="$(openssl rand -base64 24)"
#
#    kubectl create secret generic twenty-secret \
#      --from-literal=app_secret="$(openssl rand -base64 32)" \
#      --from-literal=encryption_key="$(openssl rand -base64 32)" \
#      --from-literal=fallback_encryption_key="" \
#      --from-literal=database_url="postgres://postgres:THE_SAME_DB_PASSWORD@twenty-twentycrm-chart-db:5432/default"
#
# 2. Install:
#
#    helm install twenty oci://ghcr.io/kaiwhodevs/twentycrm-chart \
#      --version v2.8.3 -f secret-free.yaml
config:
  serverUrl: https://crm.example.com

secret:
  # App secrets (+ the full connection string) from a pre-created Secret.
  secretRef: twenty-secret
  secretRefKey:
    appSecret: app_secret
    encryptionKey: encryption_key
    fallbackEncryptionKey: fallback_encryption_key
    databaseUrl: database_url
  # PostgreSQL password (bundled db) from a pre-created Secret.
  db:
    secretRef: twenty-db
    secretRefKey:
      password: database_password
