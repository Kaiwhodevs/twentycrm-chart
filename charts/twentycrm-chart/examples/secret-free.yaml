# Secret-free values: no passwords, tokens, or secrets anywhere in values or the
# Helm release history. Every sensitive value comes from pre-created Kubernetes
# Secrets via secretKeyRef (the Supabase chart pattern).
#
# secretRefKey is an OPEN map of  <ENV_VAR>: <key-in-secret>.
#   * ENV_VAR (uppercase) is exactly what Twenty expects.
#   * the Secret key (lowercase) keeps the Secret clean and readable.
#
# 1. Create the Secrets (lowercase keys):
#
#    kubectl create secret generic cod3labs-twenty-db \
#      --from-literal=pg_database_password="$(openssl rand -base64 24)"
#
#    kubectl create secret generic cod3labs-twenty-secret \
#      --from-literal=app_secret="$(openssl rand -base64 32)" \
#      --from-literal=encryption_key="$(openssl rand -base64 32)" \
#      --from-literal=fallback_encryption_key="" \
#      --from-literal=pg_database_url="postgres://postgres:THE_SAME_DB_PASSWORD@twenty-twentycrm-chart-db:5432/default"
#
# 2. Install:
#
#    helm install twenty oci://ghcr.io/kaiwhodevs/twentycrm-chart \
#      --version v2.8.3 -f secret-free.yaml
config:
  serverUrl: https://crm.example.com

# DB password sourced from a pre-created Secret (POSTGRES_PASSWORD via secretKeyRef).
postgresql:
  auth:
    secretRef: cod3labs-twenty-db
    secretRefKey:
      POSTGRES_PASSWORD: pg_database_password

# Server/worker sensitive env. Each line is  <ENV_VAR>: <key-in-secret>.
secret:
  secretRef: cod3labs-twenty-secret
  secretRefKey:
    APP_SECRET: app_secret
    ENCRYPTION_KEY: encryption_key
    FALLBACK_ENCRYPTION_KEY: fallback_encryption_key
    PG_DATABASE_URL: pg_database_url

    # Adding SMTP (or any other secret) later needs no chart change:
    #   1. add the key to the Secret:
    #      kubectl patch secret cod3labs-twenty-secret --type=merge \
    #        -p '{"stringData":{"email_smtp_password":"..."}}'
    #   2. add one line here and `helm upgrade`:
    # EMAIL_SMTP_PASSWORD: email_smtp_password
    # AUTH_GOOGLE_CLIENT_SECRET: auth_google_client_secret
