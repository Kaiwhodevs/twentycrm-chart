# Example: use a managed PostgreSQL and Redis instead of the bundled ones.
#
#   # DB password in a pre-created Secret:
#   kubectl create secret generic twenty-extdb \
#     --from-literal=database_password="CHANGE_ME"
#
#   helm install twenty oci://ghcr.io/kaiwhodevs/twentycrm-chart \
#     --version v2.8.3 -f external-services.yaml
config:
  serverUrl: https://crm.example.com

# Managed PostgreSQL (n8n-style). When enabled, the bundled postgresql is not
# deployed; PG_DATABASE_URL is assembled from these fields plus the password
# pulled from secretRef at runtime (never stored in values).
externalDatabase:
  enabled: true
  host: my-postgres-host
  port: 5432
  database: default
  user: twenty
  ssl: true                # appends ?sslmode=require
  secretRef: twenty-extdb
  secretRefKey:
    password: database_password

# Managed Redis: disable the bundled one and supply a URL.
redis:
  enabled: false
externalRedis:
  url: redis://my-redis-host:6379
