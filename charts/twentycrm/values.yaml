# Default values for twentycrm.
#
# This chart mirrors the official Twenty docker-compose
# (packages/twenty-docker/docker-compose.yml) - same services, same defaults,
# same environment variables - packaged for Kubernetes. A default
# `helm install` brings up a working instance out of the box, exactly like
# `docker compose up`.
#
#   server  -> Deployment + Service   (twentycrm/twenty)
#   worker  -> Deployment             (twentycrm/twenty, "yarn worker:prod")
#   db      -> StatefulSet + Service  (postgres:16)
#   redis   -> Deployment + Service   (redis)
#
# Non-sensitive env vars are rendered into a ConfigMap; sensitive ones into a
# Secret (swap in your own via secret.secretRef / postgresql.auth.secretRef).

# -----------------------------------------------------------------------------
# Global parameters (shared with any future subcharts)
# -----------------------------------------------------------------------------
global:
  # Overrides the image registry for all images (server, worker, db, redis).
  imageRegistry: ""
  # Pull secrets applied to every pod, e.g. [{ name: my-registry }].
  imagePullSecrets: []
  # Default StorageClass for all PersistentVolumeClaims.
  storageClass: ""
# -----------------------------------------------------------------------------
# Common parameters
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
# In-cluster DNS domain, used to build service hostnames.
clusterDomain: cluster.local
# Labels added to every object created by this chart.
commonLabels: {}
# Annotations added to every object created by this chart.
commonAnnotations: {}
# Array of extra raw manifests (strings or maps) to deploy with the release.
extraDeploy: []
# -- twentycrm/twenty image used by both the server and the worker.
image:
  registry: "" # overrides global.imageRegistry for this image
  repository: twentycrm/twenty
  # Image tag. Tracks the upstream release (v-prefixed). Empty -> .Chart.AppVersion.
  tag: "v2.11.2"
  pullPolicy: IfNotPresent
# -- Pull secrets for the images (merged with global.imagePullSecrets).
imagePullSecrets: []
serviceAccount:
  create: true
  name: ""
  automount: true
  annotations: {}
# Pod-level and container-level security contexts applied to server & worker.
# fsGroup 1000 matches the Twenty image's node user (uid/gid 1000) so the
# .local-storage PVC is group-writable on mount - without it, Kubernetes mounts
# the volume as root and Twenty gets "EACCES: permission denied" on file upload.
podSecurityContext:
  fsGroup: 1000
securityContext: {}
# ---------------------------------------------------------------------------
# server - the Twenty API/app container (compose service "server")
# ---------------------------------------------------------------------------
server:
  replicaCount: 1
  # Deployment update strategy. Recreate is the safe default because the server
  # shares a ReadWriteOnce local-storage PVC (a RollingUpdate can deadlock on the
  # single-attach volume). Switch to RollingUpdate with S3 storage / RWX volumes.
  strategy:
    type: Recreate
  service:
    type: ClusterIP
    port: 3000
    annotations: {}
  # startupProbe gives the first boot time to run DB migrations before the
  # liveness probe can kill the container.
  startupProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  # Probes (compose healthcheck: curl http://localhost:3000/healthz).
  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10
  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10
  # Horizontal Pod Autoscaler for the server.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 0
  # PodDisruptionBudget for the server.
  pdb:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""
  resources: {}
  # Extra env vars injected directly into the server container. Supports plain
  # values and valueFrom (secretKeyRef, configMapKeyRef, ...). Use for sensitive
  # integration credentials that shouldn't go in the ConfigMap, e.g.:
  # - name: EMAIL_SMTP_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-smtp-secret
  #       key: smtp_password
  # - name: AUTH_GOOGLE_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-oauth-secret
  #       key: google_client_secret
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
# ---------------------------------------------------------------------------
# worker - background jobs (compose service "worker", "yarn worker:prod")
# ---------------------------------------------------------------------------
worker:
  replicaCount: 1
  # See server.strategy - the worker shares the same RWO local-storage PVC.
  strategy:
    type: Recreate
  resources: {}
  # Same as server.extraEnv - injected directly into the worker container.
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
# ---------------------------------------------------------------------------
# Non-sensitive environment -> ConfigMap (server & worker, via envFrom)
# ---------------------------------------------------------------------------
config:
  # SERVER_URL - public URL of this instance, e.g. https://crm.example.com.
  serverUrl: ""
  # NODE_PORT - port the server listens on.
  nodePort: 3000
  # Server-only migration/cron toggles. The worker always forces both to "true"
  # (mirrors the compose, where these jobs run on the server only).
  disableDbMigrations: ""
  disableCronJobsRegistration: ""
  # Attachment / file storage. Twenty REQUIRES STORAGE_TYPE to be set to a valid
  # value ("local" or "s3"); an empty string fails config validation on startup.
  storage:
    type: "local" # STORAGE_TYPE  ("local" or "s3")
    s3Region: "" # STORAGE_S3_REGION
    s3Name: "" # STORAGE_S3_NAME
    s3Endpoint: "" # STORAGE_S3_ENDPOINT
# -- Extra non-sensitive env vars merged into the ConfigMap. Use for the
# optional integrations commented out in the upstream compose, e.g.:
#   EMAIL_FROM_ADDRESS: contact@yourdomain.com
#   EMAIL_DRIVER: smtp
#   EMAIL_SMTP_HOST: smtp.gmail.com
#   EMAIL_SMTP_PORT: "465"
#   MESSAGING_PROVIDER_GMAIL_ENABLED: "true"
#   AUTH_GOOGLE_CLIENT_ID: ...
extraEnv: {}
# ---------------------------------------------------------------------------
# Sensitive values (Supabase-style secret blocks).
#
# Each block can be supplied two ways:
#   * generated mode  - leave `secretRef` empty; the chart creates a Secret from
#     the fields here (appSecret / encryptionKey / db.password are auto-generated
#     when blank, and persisted across upgrades).
#   * secretRef mode  - point `secretRef` at a pre-created Secret; every field is
#     sourced from it via secretKeyRef. Nothing sensitive is stored in values.
#
# `secretRefKey` maps each FIELD name to the key inside the Secret. Secret keys
# use a lowercase convention (app_secret, database_url, …) so the Secret stays
# clean; the field names are fixed and map to Twenty's env vars internally.
# ---------------------------------------------------------------------------
secret:
  appSecret: "" # -> APP_SECRET (auto-generated when blank)
  encryptionKey: "" # -> ENCRYPTION_KEY (auto-generated when blank)
  fallbackEncryptionKey: "" # -> FALLBACK_ENCRYPTION_KEY
  secretRef: ""
  secretRefKey:
    appSecret: app_secret
    encryptionKey: encryption_key
    fallbackEncryptionKey: fallback_encryption_key
    databaseUrl: database_url
  # PostgreSQL password. Used by the bundled db (POSTGRES_PASSWORD) and to build
  # PG_DATABASE_URL at runtime. Ignored when externalDatabase.enabled is true.
  db:
    password: "" # auto-generated when blank
    secretRef: ""
    secretRefKey:
      password: database_password
# ---------------------------------------------------------------------------
# PostgreSQL - bundled "db" service (postgres:16)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    registry: ""
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    username: postgres # POSTGRES_USER (non-sensitive). Password -> secret.db
    database: default # POSTGRES_DB   (non-sensitive)
  # Hostname override; defaults to the in-cluster db Service when empty.
  host: ""
  port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
# External PostgreSQL (n8n-style). When enabled, the bundled postgresql is NOT
# deployed (postgresql.enabled is ignored) and PG_DATABASE_URL is assembled from
# the non-sensitive fields below plus the password sourced from `secretRef` at
# runtime - the password never touches values or the ConfigMap.
externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: default
  user: postgres
  ssl: false # true -> appends ?sslmode=require
  secretRef: "" # required when enabled: holds the DB password
  secretRefKey:
    password: database_password
# ---------------------------------------------------------------------------
# Redis - bundled "redis" service
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    registry: ""
    repository: redis
    tag: "" # "" -> "latest" (mirrors `image: redis` in the compose)
    pullPolicy: IfNotPresent
  # compose: command ["--maxmemory-policy", "noeviction"]
  maxmemoryPolicy: noeviction
  service:
    port: 6379
  persistence:
    enabled: false
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
# External Redis: set redis.enabled=false and supply a URL.
externalRedis:
  url: "" # redis://host:6379
# ---------------------------------------------------------------------------
# Shared local storage (compose volume "server-local-data", mounted by both
# server and worker). With STORAGE_TYPE=local both pods share this volume, so on
# multi-node clusters use a ReadWriteMany storageClass - or switch to S3 storage
# (config.storage.type=s3) and disable this.
# ---------------------------------------------------------------------------
localStorage:
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
# ---------------------------------------------------------------------------
# Ingress for the server Service.
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: crm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: twenty-tls
  #    hosts:
  #      - crm.example.com
