name: Release chart

# Triggered by a v-prefixed tag (pushed by check-upstream-release.yml or by hand).
# Packages the chart at that version, pushes it to GHCR as an OCI artifact, and
# signs it with cosign (keyless, via GitHub OIDC) so Artifact Hub shows the
# "Signed" badge:
#   oci://ghcr.io/kaiwhodevs/twentycrm-chart:<tag>

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless (OIDC) signing

env:
  CHART_DIR: charts/twentycrm-chart

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CHART_VERSION=$(yq '.version' "$CHART_DIR/Chart.yaml")
          if [ "$TAG" != "$CHART_VERSION" ]; then
            echo "Tag ($TAG) does not match Chart.yaml version ($CHART_VERSION)." >&2
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: helm lint "$CHART_DIR"

      - name: Package
        run: helm package "$CHART_DIR" --destination dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        run: |
          # helm uses its own registry config; cosign reads the docker config -
          # log in to both so the push and the signature both authenticate.
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        id: push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          out=$(helm push "dist/twentycrm-chart-${VERSION}.tgz" "oci://ghcr.io/kaiwhodevs" 2>&1)
          echo "$out"
          digest=$(echo "$out" | awk '/Digest:/ {print $2}')
          if [ -z "$digest" ]; then
            echo "Could not parse pushed digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed oci://ghcr.io/kaiwhodevs/twentycrm-chart:${VERSION} ($digest)"

      - name: Sign with cosign (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/kaiwhodevs/twentycrm-chart@${DIGEST}"
          echo "Signed ghcr.io/kaiwhodevs/twentycrm-chart@${DIGEST}"
