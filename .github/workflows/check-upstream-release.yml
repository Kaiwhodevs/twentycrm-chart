name: Check upstream release

# Every 6 hours, look at the newest twentycrm/twenty image tag published to Docker
# Hub. If it is newer than the version this chart currently tracks, bump Chart.yaml
# + values.yaml, commit, and push a matching v-prefixed git tag. That tag triggers
# release-chart.yml.
#
# We track Docker Hub image tags (not GitHub releases) because the chart deploys
# those images: Twenty cuts a GitHub release only at vX.Y.0 but publishes patch
# images (vX.Y.Z) without matching releases, and never published a v2.8.0 image.
#
# Requirements:
#   - A repository secret named RELEASE_PAT (a PAT / fine-grained token with
#     "Contents: write"). It is used to push the commit and tag so that the tag
#     push event is able to trigger the release workflow (the default
#     GITHUB_TOKEN deliberately cannot trigger other workflows).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: check-upstream-release
  cancel-in-progress: false

env:
  CHART_DIR: charts/twentycrm-chart

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release token
        env:
          HAS_PAT: ${{ secrets.RELEASE_PAT != '' }}
        run: |
          if [ "$HAS_PAT" = "true" ]; then
            echo "::notice::RELEASE_PAT is configured - tag pushes will trigger the release workflow."
          else
            echo "::warning::RELEASE_PAT is NOT set. Tag pushes will use GITHUB_TOKEN and will NOT trigger release-chart.yml. Add the RELEASE_PAT secret to enable hands-off releases."
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_PAT || github.token }}
          fetch-depth: 0

      - name: Determine latest published image tag
        id: upstream
        run: |
          set -euo pipefail
          # Highest concrete semver tag (vX.Y.Z) actually published as an image.
          # Moving tags (v2, v2.8) and 'latest' are excluded.
          LATEST=$(curl -fsSL "https://hub.docker.com/v2/repositories/twentycrm/twenty/tags?page_size=100&ordering=last_updated" \
            | jq -r '.results[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            echo "Could not resolve latest twentycrm/twenty image tag" >&2
            exit 1
          fi
          echo "Latest published image: twentycrm/twenty:$LATEST"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Read current chart version
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(yq '.version' "$CHART_DIR/Chart.yaml")
          echo "Current chart version: $CURRENT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        env:
          LATEST: ${{ steps.upstream.outputs.latest }}
          CURRENT: ${{ steps.current.outputs.current }}
        run: |
          set -euo pipefail
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already up to date ($CURRENT)."
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Highest of the two, comparing without the leading "v".
          NEWEST=$(printf '%s\n%s\n' "${LATEST#v}" "${CURRENT#v}" | sort -V | tail -n1)
          if [ "v$NEWEST" != "$LATEST" ]; then
            echo "Current ($CURRENT) is >= latest ($LATEST); nothing to do."
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "New upstream release detected: $CURRENT -> $LATEST"
          echo "bump=true" >> "$GITHUB_OUTPUT"

      - name: Bump chart, commit and tag
        if: steps.compare.outputs.bump == 'true'
        env:
          LATEST: ${{ steps.upstream.outputs.latest }}
        run: |
          set -euo pipefail
          yq -i ".version = \"${LATEST}\"" "$CHART_DIR/Chart.yaml"
          yq -i ".appVersion = \"${LATEST}\"" "$CHART_DIR/Chart.yaml"
          yq -i ".image.tag = \"${LATEST}\"" "$CHART_DIR/values.yaml"
          # Keep the artifacthub.io/images annotation tag in sync.
          sed -i "s#twentycrm/twenty:v[0-9.]*#twentycrm/twenty:${LATEST}#g" "$CHART_DIR/Chart.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CHART_DIR/Chart.yaml" "$CHART_DIR/values.yaml"
          git commit -m "chore: bump Twenty CRM to ${LATEST}"

          # Abort if the tag somehow already exists.
          if git rev-parse "refs/tags/${LATEST}" >/dev/null 2>&1; then
            echo "Tag ${LATEST} already exists; pushing commit only."
            git push origin HEAD:${GITHUB_REF_NAME}
            exit 0
          fi

          git tag "${LATEST}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "refs/tags/${LATEST}"
          echo "Pushed bump commit and tag ${LATEST}."
